<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0c0c0e">
<title>CashFlow</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#0c0c0e;font-family:'Nunito Sans',sans-serif;color:#d4d4d4}
::-webkit-scrollbar{width:0}
.app{display:flex;flex-direction:column;height:100%;max-width:500px;margin:0 auto}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:8px 14px 80px}
.bal-card{padding:16px 18px;border-radius:18px;cursor:pointer;transition:all .3s}
.bal-card.pos{background:linear-gradient(135deg,#071a07,#0a220a);border:1.5px solid #22c55e35}
.bal-card.neg{background:linear-gradient(135deg,#1a0707,#220a0a);border:1.5px solid #ef444435}
.bal-bar{height:5px;border-radius:3px;background:#1a1a1c;margin-top:10px;overflow:hidden}
.bal-fill{height:100%;border-radius:3px;transition:width .4s}
.day-bubble{background:#131315;border-radius:18px;padding:12px 14px;margin-bottom:8px;border:1.5px solid #1e1e20;transition:all .2s}
.day-bubble.today{background:linear-gradient(135deg,#0f1a2e,#111a30);border-color:#3b82f688;border-width:2px}
.day-bubble.danger{background:#1a0808;border-color:#ef444425}
.day-bubble.active{background:#0f1a2e!important;border-color:#3b82f655!important}
.day-item{display:flex;align-items:center;gap:10px;padding:8px 10px;margin-bottom:3px;border-radius:0 12px 12px 0;cursor:pointer}
.tab-bar{display:flex;gap:2px;background:#111;border-radius:12px;padding:3px}
.tab-btn{padding:6px 14px;font-size:13px;font-weight:600;cursor:pointer;border:none;border-radius:10px;background:transparent;color:#555;font-family:inherit}
.tab-btn.on{background:#22c55e;color:#000;font-weight:700}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-cell{padding:5px 4px;border-radius:10px;min-height:50px;transition:all .15s}
.cal-cell.in-period{background:rgba(34,197,94,0.06)}
.cal-cell.is-today{background:rgba(59,130,246,0.1);border:1.5px solid rgba(59,130,246,0.3)}
.cal-cell.is-pay{background:rgba(34,197,94,0.12);border:1.5px solid rgba(34,197,94,0.3)}
.cal-cell.is-neg{background:rgba(239,68,68,0.06)}
.modal-bg{position:fixed;inset:0;z-index:999;display:flex;align-items:flex-end;justify-content:center}
.modal-overlay{position:absolute;inset:0;background:rgba(0,0,0,.75)}
.modal-sheet{position:relative;background:#161618;border-radius:20px 20px 0 0;padding:16px 20px 32px;width:100%;max-width:500px;max-height:85vh;overflow-y:auto}
.modal-pill{width:36px;height:4px;border-radius:2px;background:#333;margin:0 auto 14px}
.fi{background:#111;border:1px solid #2a2a2c;border-radius:10px;color:#ddd;padding:10px 12px;font-size:14px;font-family:inherit;outline:none;width:100%;box-sizing:border-box}
.fi-select{appearance:none;cursor:pointer}
.btn{background:#1e1e20;border:1px solid #2a2a2c;border-radius:10px;color:#bbb;padding:8px 16px;font-size:14px;cursor:pointer;font-family:inherit}
.btn-g{background:#22c55e;border:none;color:#000;font-weight:700}
.btn-r{background:transparent;border:1px solid #991b1b44;color:#ef4444}
.av{border-radius:50%;flex-shrink:0;border:2px solid #333}
.bw-card{padding:10px 14px;border-radius:14px;border:1.5px solid #1e1e20;background:#131315;margin-bottom:6px;cursor:pointer;transition:all .15s}
.bw-card.active{border-color:#22c55e55;background:rgba(34,197,94,0.06)}
.dc{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:700}
.dc.up{background:rgba(34,197,94,0.12);color:#4ade80}
.dc.down{background:rgba(239,68,68,0.12);color:#ef4444}
.b-item{display:flex;align-items:center;gap:8px;padding:9px 11px;margin-bottom:3px;border-radius:0 12px 12px 0}
.b-item button{background:none;border:none;cursor:pointer;font-size:15px;padding:4px;flex-shrink:0}
.sav-card{padding:16px;background:#131315;border-radius:16px;border:1.5px solid #eab30822;margin-bottom:12px}
@keyframes rainbowshift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes rainbowglow{0%{box-shadow:0 0 8px rgba(255,0,68,0.3)}25%{box-shadow:0 0 8px rgba(255,200,0,0.3)}50%{box-shadow:0 0 8px rgba(0,170,255,0.3)}75%{box-shadow:0 0 8px rgba(170,0,255,0.3)}100%{box-shadow:0 0 8px rgba(255,0,68,0.3)}}
.wi-bar{background:linear-gradient(90deg,#cc003888,#cc660088,#aaaa0088,#00995588,#007acc88,#553fbb88,#993fcc88,#cc003888);background-size:200% 100%;animation:rainbowshift 4s ease infinite,rainbowglow 4s ease infinite;border-radius:0 12px 12px 0;padding:9px 12px;display:flex;align-items:center;gap:10px;margin-bottom:3px;cursor:pointer;border-left:3px solid;border-image:linear-gradient(180deg,#ff0044,#ffdd00,#00aaff,#aa00ff) 1}
</style>
</head>

// Build all items including auto-generated lunch and savings
function allItems(data){
  const items=[...data.items];
  // Lunch items from work schedules (only me and partner)
  for(const k of ['me','partner']){
    const s=data.sch[k];
    if(s&&s.lunch&&s.lunch>0){
      items.push({id:'_lunch_'+k,name:s.name+' Lunch',amt:s.lunch,type:'expense',cat:'lunch',freq:'daily',start:'2026-03-01',end:'',who:k,auto:true});
    }
  }
  // Babysitter expense - daily on selected days
  const bs=data.sch.babysitter;
  if(bs&&bs.rate&&bs.rate>0){
    items.push({id:'_babysitter',name:bs.name||'Babysitter',amt:bs.rate,type:'expense',cat:'other',freq:'daily',start:'2026-03-01',end:'',who:'babysitter',auto:true});
  }
  // Savings plan
  if(data.savingsPlan&&data.savingsPlan>0){
    items.push({id:'_savings',name:'Savings Plan',amt:data.savingsPlan,type:'expense',cat:'savings',freq:data.savingsFreq||'biweekly',start:data.savingsStart||'2026-03-12',end:'',who:'',auto:true});
  }
  // What-if test expenses
  if(data.whatifs){
    for(const wi of data.whatifs){
      items.push({id:'_wi_'+wi.id,name:wi.name,amt:wi.amt,type:'expense',cat:'other',freq:'once',start:wi.date,end:'',who:'',auto:true,whatif:true});
    }
  }
  return items;
}

function getOcc(item,rs,re,sch){const s=pk(item.start),e=item.end?pk(item.end):re,res=[];if(s>re||e<rs)return res;
  // Only apply work-schedule filtering for daily items (like lunch) - not for biweekly pay etc
  const useWorkFilter=item.freq==='daily'&&item.who;
  const sc=useWorkFilter&&sch[item.who]?sch[item.who]:null;
  const ok=d=>{if(!sc)return true;if(sc.custom&&item.who==='partner')return isMW(d)&&!(sc.off||[]).includes(dk(d));return sc.days[d.getDay()]&&!(sc.off||[]).includes(dk(d));};
  const a2=d=>{if(d>=rs&&d<=re&&d>=s&&d<=e&&(!sc||ok(d)))res.push(dk(d));};
  if(item.freq==='once')a2(s);else if(item.freq==='daily'){let c=new Date(Math.max(s,rs));const st=new Date(Math.min(e,re));while(c<=st){a2(c);c=ad(c,1);}}else if(item.freq==='weekly'){let c=new Date(s);while(c<=re){a2(c);c=ad(c,7);}}else if(item.freq==='biweekly'){let c=new Date(s);while(c<=re){a2(c);c=ad(c,14);}}else if(item.freq==='monthly'){let y=rs.getFullYear(),m=rs.getMonth();while(1){let d=new Date(y,m,s.getDate());if(d.getMonth()!==m)d.setDate(0);if(d>re)break;a2(d);m++;if(m>11){m=0;y++;}}}return res;}

function buildTimeline(data){
  const its=allItems(data);
  const start=pk(data.balDate),end=ad(start,180),map={};
  let c=new Date(start);while(c<=end){map[dk(c)]={date:dk(c),inc:0,exp:0,items:[]};c=ad(c,1);}
  for(const it of its){const o=getOcc(it,start,end,data.sch);for(const k of o){if(!map[k])continue;map[k].items.push(it);if(it.type==='income')map[k].inc+=it.amt;else map[k].exp+=it.amt;}}
  let bal=data.bal;const bd=pk(data.balDate);
  const sorted=Object.values(map).sort((a,b)=>a.date.localeCompare(b.date));
  for(const day of sorted){const dd=pk(day.date);if(dd<bd){day.bal=null;continue;}bal+=day.inc-day.exp;day.bal=bal;}
  return{sorted,map};
}

let DATA,VIEW_M=TM,VIEW_Y=TY,TAB='flow',TL,TLM,ACTIVE_DAY='_NOW_',SEL_PERIOD=0;
let FIREBASE_READY=false,SAVING=false;

function load(){try{const s=localStorage.getItem('cashflow-v5');if(s)return JSON.parse(s);}catch(e){}return getDefaults();}
function save(){
  try{localStorage.setItem('cashflow-v5',JSON.stringify(DATA));}catch(e){}
  // Save to Firebase
  SAVING=true;
  dbRef.set(DATA).then(()=>{SAVING=false;}).catch(()=>{SAVING=false;});
}
function recompute(){const r=buildTimeline(DATA);TL=r.sorted;TLM=r.map;}

// Load from localStorage first for instant display
DATA=load();recompute();

// Then try to load from Firebase and listen for changes
dbRef.once('value').then(snap=>{
  if(snap.exists()){
    DATA=snap.val();
    // Ensure arrays exist (Firebase drops empty arrays)
    if(!DATA.items)DATA.items=[];
    if(!DATA.pending)DATA.pending=[];
    if(!DATA.whatifs)DATA.whatifs=[];
    localStorage.setItem('cashflow-v5',JSON.stringify(DATA));
    recompute();render();
  } else {
    // First time: push local data to Firebase
    dbRef.set(DATA);
  }
  FIREBASE_READY=true;
}).catch(()=>{FIREBASE_READY=false;});

// Listen for real-time changes from the other device
dbRef.on('value',snap=>{
  if(SAVING)return; // ignore our own writes
  if(!snap.exists())return;
  const remote=snap.val();
  if(!remote.items)remote.items=[];
  if(!remote.pending)remote.pending=[];
  if(!remote.whatifs)remote.whatifs=[];
  // Only update if data actually changed
  if(JSON.stringify(remote)!==JSON.stringify(DATA)){
    DATA=remote;
    localStorage.setItem('cashflow-v5',JSON.stringify(DATA));
    recompute();render();
  }
});

function getBWPeriods(){
  const s=new Date(VIEW_Y,VIEW_M,1),e=new Date(VIEW_Y,VIEW_M+1,0),its=allItems(DATA),payDays=[];
  for(const it of its){if(it.type!=='income'||it.cat!=='paycheck')continue;getOcc(it,s,e,DATA.sch).forEach(d=>{if(!payDays.includes(d))payDays.push(d);});}
  payDays.sort();const periods=[];
  for(let i=0;i<payDays.length;i++){
    const ps=payDays[i],pe=payDays[i+1]?dk(ad(pk(payDays[i+1]),-1)):dk(e);
    let inc=0,exp=0,cur=new Date(pk(ps));const stop=pk(pe);
    while(cur<=stop){const k=dk(cur),day=TLM[k];if(day){inc+=day.inc;exp+=day.exp;}cur=ad(cur,1);}
    periods.push({start:ps,end:pe,inc,exp,startBal:TLM[ps]?.bal,endBal:TLM[pe]?.bal});
  }
  return periods;
}

let scrollTicking=false,lastHapticDay=null,scrollLocked=false;
function haptic(ms){try{if(navigator.vibrate)navigator.vibrate(ms||1);}catch(e){}}
function onFlowScroll(){
  if(scrollLocked||scrollTicking)return;scrollTicking=true;
  requestAnimationFrame(()=>{
    try{
      const area=document.getElementById('scrollArea');if(!area){scrollTicking=false;return;}
      const bubbles=area.querySelectorAll('[data-day]');if(!bubbles.length){scrollTicking=false;return;}
      const targetY=area.getBoundingClientRect().top+area.clientHeight*0.3;
      let best=null,bestDist=Infinity;
      bubbles.forEach(el=>{const r=el.getBoundingClientRect();const dist=Math.abs(r.top+r.height/2-targetY);if(dist<bestDist){bestDist=dist;best=el.dataset.day;}});
      if(best&&best!==ACTIVE_DAY){
        ACTIVE_DAY=best;updateBalHeader();
        bubbles.forEach(el=>{el.classList.toggle('active',el.dataset.day===best);});
        const d=pk(best);
        const navSpan=document.getElementById('monthNav');
        if(navSpan)navSpan.textContent=ML[d.getMonth()].slice(0,3)+' '+d.getFullYear();
        if(best!==lastHapticDay){lastHapticDay=best;haptic(1);}
      }
      if(area.scrollHeight-area.scrollTop-area.clientHeight<300){loadMoreFlow();}
      SCROLL_POS.flow=area.scrollTop;
    }catch(e){}
    scrollTicking=false;
  });
}

function renderFlow(){
  FLOW_MONTHS=3;
  NOW_INSERTED=false;
  let h='';
  for(let i=0;i<FLOW_MONTHS;i++){
    let m=VIEW_M+i,y=VIEW_Y;while(m>11){m-=12;y++;}
    const mh=renderFlowMonth(y,m);
    h+=mh||'';
  }
  h+=`<div id="flowEnd" style="padding:20px;text-align:center;font-size:12px;color:#444">Scroll for more...</div>`;
  // Auto-scroll to NOW marker after render, lock scroll handler so _NOW_ mode persists
  setTimeout(()=>{
    scrollLocked=true;
    const el=document.getElementById('nowMarker');
    if(el)el.scrollIntoView({block:'start',behavior:'auto'});
    setTimeout(()=>{scrollLocked=false;},200);
  },50);
  return h;
}

function loadMoreFlow(){
  const container=document.getElementById('flowEnd');if(!container)return;
  let m=VIEW_M+FLOW_MONTHS,y=VIEW_Y;while(m>11){m-=12;y++;}
  if(FLOW_MONTHS>=6)return;
  FLOW_MONTHS++;
  const newHtml=renderFlowMonth(y,m)||'';
  container.insertAdjacentHTML('beforebegin',newHtml);
  if(FLOW_MONTHS>=6)container.textContent='End of projection';
}

function renderBudget(){
  const its=allItems(DATA),groups={};
  for(const it of its){
    if(it.whatif)continue; // shown in Quick Adds section
    const key=it.type==='income'?'_inc':it.cat;
    if(!groups[key])groups[key]={cat:key,items:[],total:0,isInc:it.type==='income'};
    let mo=it.amt;
    if(it.freq==='weekly')mo=it.amt*4.33;
    else if(it.freq==='biweekly')mo=it.amt*2.17;
    else if(it.freq==='daily'){
      if(it.who==='me'){mo=it.amt*17;}
      else if(it.who==='partner'){mo=it.amt*15;}
      else if(it.who==='babysitter'){
        const bsDays=DATA.sch.babysitter?Object.values(DATA.sch.babysitter.days).filter(Boolean).length:0;
        mo=it.amt*bsDays*4.33;
      }
      else{mo=it.amt*30;}
    }
    groups[key].items.push({...it,moEst:mo});groups[key].total+=mo;
  }
  const sorted=Object.values(groups).sort((a,b)=>a.isInc?-1:b.isInc?1:b.total-a.total);
  const totInc=sorted.filter(g=>g.isInc).reduce((s,g)=>s+g.total,0),totExp=sorted.filter(g=>!g.isInc).reduce((s,g)=>s+g.total,0);

  // Quick Add section - collapsible

        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-size:14px;font-weight:700;color:#a855f7">${$(wiTotal)}</span>
          <span style="font-size:12px;color:#666;transition:transform .2s;display:inline-block;transform:rotate(${WI_OPEN?'180':'0'}deg)">▼</span>

        ${wis.map(w=>`<div class="wi-bar" style="margin-bottom:4px;cursor:pointer" onclick="removeWhatIf('${w.id}')"><span style="font-size:11px;flex-shrink:0">✨</span><div style="flex:1;min-width:0"><span style="font-size:14px;font-weight:700;color:#fff">${w.name}</span><span style="font-size:9px;color:rgba(255,255,255,0.6);background:rgba(255,255,255,0.15);padding:1px 5px;border-radius:4px;margin-left:4px">via Quick Add</span></div><span style="font-size:15px;font-weight:800;color:#fff">-${$(w.amt)}</span></div>`).join('')}

      </div>`:''}
    </div>`;
  }

  // Savings plan card
  h+=`<div class="sav-card" style="margin-top:4px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
      <div style="font-size:11px;color:#eab308;font-weight:700;letter-spacing:0.05em">SAVINGS PLAN</div>

    </div>

    <div style="font-size:12px;color:#666;margin-top:4px">≈ ${$(((DATA.savingsPlan||0)*(DATA.savingsFreq==='biweekly'?2.17:DATA.savingsFreq==='weekly'?4.33:1)))}/month into savings</div>
  </div>`;

  h+=`<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:14px">

    for(const it of g.items){

      const isAuto=it.auto&&!isWI;
      const autoNav=isAuto?(it.id.includes('lunch')||it.id.includes('babysitter')?'showSchedules()':'editSavings()'):'';
      const wiNav=isWI?`removeWhatIf('${it.id.replace('_wi_','')}')`:'';
      h+=`<div class="b-item" style="background:${c}0c;border-left:3px solid ${c};cursor:pointer" onclick="${isWI?wiNav:isAuto?autoNav:''}">${it.who?avatar(it.who,20):''}<div style="flex:1;min-width:0"><div style="font-size:14px;color:#ccc;font-weight:500">${it.name}${isWI?' <span style="font-size:9px;color:rgba(168,85,247,0.8);background:rgba(168,85,247,0.15);padding:1px 5px;border-radius:4px">via Quick Add</span>':isAuto?` <span style="font-size:9px;color:#60a5fa;background:#60a5fa15;padding:1px 5px;border-radius:4px">via ${it.id.includes('lunch')||it.id.includes('babysitter')?'Schedules':'Savings Plan'}</span>`:''}</div><div style="font-size:11px;color:#666">${it.freq} · ${$(it.amt)}</div></div><span style="font-size:14px;font-weight:600;color:${g.isInc?'#4ade80':'#bbb'};flex-shrink:0">${$(it.moEst)}</span>${!isAuto&&!isWI?`<button style="color:#888" onclick="event.stopPropagation();showItemForm('${it.id}')">✎</button><button style="color:#ef444466" onclick="event.stopPropagation();removeItem('${it.id}')">×</button>`:''}</div>`;}

  return h;

function goToNow(){
  haptic(3);
  if(TAB!=='flow'){
    // From another tab: go to flow at last scroll position
    const area=document.getElementById('scrollArea');
    if(area)SCROLL_POS[TAB]=area.scrollTop;
    TAB='flow';render();
    return;
  }
  if(ACTIVE_DAY!=='_NOW_'){
    // On flow but scrolled: go to NOW/today
    scrollLocked=true;
    VIEW_M=TM;VIEW_Y=TY;
    ACTIVE_DAY='_NOW_';
    render();
    setTimeout(()=>{scrollLocked=false;},300);
    return;
  }
  // Already at NOW: no-op or re-render

function editSavings(){const bg=document.createElement('div');bg.className='modal-bg';bg.id='modal';bg.innerHTML=`<div class="modal-overlay" onclick="closeModal()"></div><div class="modal-sheet"><div class="modal-pill"></div><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px"><span style="font-size:17px;font-weight:700;color:#f0f0f0">Savings Plan</span><button onclick="closeModal()" style="background:none;border:none;color:#555;font-size:22px;cursor:pointer">×</button></div><p style="color:#888;font-size:13px;margin-bottom:12px">Set how much you want to put into savings. This will be deducted from your budget like any other expense.</p><div style="margin-bottom:10px"><div style="font-size:11px;color:#eab308;margin-bottom:3px">Amount per period</div><input id="sav_amt" class="fi" type="number" step="0.01" value="${DATA.savingsPlan||0}" style="font-size:20px;font-weight:700;color:#eab308;text-align:center"></div><div style="margin-bottom:10px"><div style="font-size:11px;color:#666;margin-bottom:3px">Frequency</div><select id="sav_freq" class="fi fi-select"><option value="biweekly" ${DATA.savingsFreq==='biweekly'?'selected':''}>Every pay period (bi-weekly)</option><option value="weekly" ${DATA.savingsFreq==='weekly'?'selected':''}>Weekly</option><option value="monthly" ${DATA.savingsFreq==='monthly'?'selected':''}>Monthly</option></select></div><div style="margin-bottom:14px"><div style="font-size:11px;color:#666;margin-bottom:3px">Start date</div><input id="sav_start" class="fi" type="date" value="${DATA.savingsStart||'2026-03-12'}"></div><button class="btn btn-g" style="width:100%;padding:12px;font-size:15px" onclick="saveSavings()">Save Plan</button></div>`;document.body.appendChild(bg);}

  const bg=document.createElement('div');bg.className='modal-bg';bg.id='modal';
  bg.innerHTML=`<div class="modal-overlay" onclick="closeModal()"></div><div class="modal-sheet"><div class="modal-pill"></div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px"><span style="font-size:17px;font-weight:700;color:#f0f0f0">Today</span><button onclick="closeModal()" style="background:none;border:none;color:#555;font-size:22px;cursor:pointer">×</button></div>

      <div style="display:flex;align-items:center;gap:8px"><input id="balInput" class="fi" type="number" step="0.01" value="${DATA.bal}" style="font-size:22px;font-weight:800;text-align:center;color:#4ade80;flex:1"><button class="btn btn-g" style="padding:10px 16px" onclick="updateBalance()">Set</button></div>
      <div style="font-size:11px;color:#555;margin-top:6px">What your bank account shows right now</div>

      <div id="pendingList">${pendingHtml}</div>
      ${pending.length>0?`<div style="display:flex;justify-content:space-between;padding:8px 0 10px;font-size:14px;font-weight:700"><span style="color:#f59e0bcc">After pending</span><span style="color:${effectiveBal<0?'#ef4444':'#f59e0b'}">${$(effectiveBal)}</span></div>`:''}

    </div>
    <button class="btn" style="width:100%;color:#555;font-size:12px" onclick="clearPending()">Clear All Pending</button>

function addPending(){
  const name=document.getElementById('pend_name')?.value;
  const amt=parseFloat(document.getElementById('pend_amt')?.value);
  if(!name||isNaN(amt))return;
  if(!DATA.pending)DATA.pending=[];
  haptic(2);DATA.pending.push({name,amt});
  save();closeModal();showNowEditor();
}
function removePending(i){
  if(!DATA.pending)return;
  haptic(1);DATA.pending.splice(i,1);
  save();closeModal();showNowEditor();
}
function clearPending(){
  DATA.pending=[];save();closeModal();render();
}
function showBalanceEditor(){const bg=document.createElement('div');bg.className='modal-bg';bg.id='modal';bg.innerHTML=`<div class="modal-overlay" onclick="closeModal()"></div><div class="modal-sheet"><div class="modal-pill"></div><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px"><span style="font-size:17px;font-weight:700;color:#f0f0f0">Update Bank Balance</span><button onclick="closeModal()" style="background:none;border:none;color:#555;font-size:22px;cursor:pointer">×</button></div><p style="color:#888;font-size:14px;margin-bottom:14px">What does your bank show right now?</p><input id="balInput" class="fi" type="number" step="0.01" value="${DATA.bal}" style="font-size:28px;font-weight:800;text-align:center;margin-bottom:14px;color:#4ade80"><button class="btn btn-g" style="width:100%;padding:14px;font-size:16px;border-radius:12px" onclick="updateBalance()">Update Balance</button></div>`;document.body.appendChild(bg);setTimeout(()=>document.getElementById('balInput')?.focus(),100);}

function setWho(w){document.getElementById('fi_who').value=w;['','me','partner'].forEach(k=>{const el=document.getElementById('who_'+k);if(el){el.style.background=k===w?'#22c55e15':'';el.style.color=k===w?'#4ade80':'#bbb';el.style.borderColor=k===w?'#22c55e44':'#2a2a2c';}});}
function saveItem(){
  const name=document.getElementById('fi_name').value;
  const amt=parseFloat(document.getElementById('fi_amt').value);
  if(!name||isNaN(amt))return;
  const item={
    id:_editingId||document.getElementById('fi_id').value,
    name:name,amt:amt,
    type:document.getElementById('fi_type').value,
    cat:document.getElementById('fi_cat').value,
    freq:document.getElementById('fi_freq').value,
    start:document.getElementById('fi_start').value,
    end:document.getElementById('fi_end').value,
    who:document.getElementById('fi_who').value
  };
  if(_editingId){
    DATA.items=DATA.items.map(i=>i.id===_editingId?item:i);

  const id=document.getElementById('fi_id').value;
  if(!id)return;

  save();recompute();closeModal();render();
}

let touchStartX=0,touchStartY=0;
document.addEventListener('touchstart',e=>{touchStartX=e.touches[0].clientX;touchStartY=e.touches[0].clientY;},{passive:true});
document.addEventListener('touchend',e=>{
  if(TAB!=='calendar')return;
  const dx=e.changedTouches[0].clientX-touchStartX;
  const dy=e.changedTouches[0].clientY-touchStartY;
  if(Math.abs(dx)>60&&Math.abs(dx)>Math.abs(dy)*1.5){
    if(dx<0)nextMonth();else prevMonth();
  }
},{passive:true});
</script></body></html>
